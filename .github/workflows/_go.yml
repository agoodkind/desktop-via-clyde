name: Go CI

on:
  workflow_call:

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-only: true
      - run: make lint

  build-test:
    name: Build and Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build
      - run: make test

  vet:
    name: Vet
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make vet

  govulncheck:
    name: Govulncheck
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make govulncheck
