name: CI

on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    uses: agoodkind/go-makefile/.github/workflows/_ci.yml@main
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      runs_on: macos-26
      # Match release.yml: the generated shim and injector need native macOS
      # tools, so the release-build gate builds darwin natively and skips linux.
      release_platforms: "darwin/amd64 darwin/arm64"
      darwin_runner: macos-26
